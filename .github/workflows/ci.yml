name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @draft-io/shared-types build
      - run: pnpm --filter @draft-io/shared-utils build
      - run: pnpm lint
      - run: pnpm format:check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @draft-io/shared-types build
      - run: pnpm --filter @draft-io/shared-utils build
      - run: pnpm --filter @draft-io/backend db:generate
      - run: pnpm typecheck

  architecture:
    name: Architecture Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm architecture:check

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @draft-io/shared-types build
      - run: pnpm --filter @draft-io/shared-utils build
      - run: pnpm --filter @draft-io/backend db:generate
      - run: pnpm test:unit

  coverage:
    name: Coverage Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @draft-io/shared-types build
      - run: pnpm --filter @draft-io/shared-utils build
      - run: pnpm --filter @draft-io/backend db:generate
      - run: pnpm --filter @draft-io/backend test:coverage

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: draft_io
          POSTGRES_PASSWORD: draft_io
          POSTGRES_DB: draft_io_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U draft_io -d draft_io_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://draft_io:draft_io@localhost:5432/draft_io_test?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @draft-io/shared-types build
      - run: pnpm --filter @draft-io/shared-utils build
      - run: pnpm --filter @draft-io/backend db:generate
      - run: pnpm --filter @draft-io/backend exec prisma db push --skip-generate
      - run: pnpm test:integration

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @draft-io/shared-types build
      - run: pnpm --filter @draft-io/shared-utils build
      - run: pnpm --filter @draft-io/backend db:generate
      - run: pnpm --filter @draft-io/backend test:e2e
      - run: pnpm --filter @draft-io/frontend exec playwright install --with-deps chromium
      - run: pnpm --filter @draft-io/frontend test:e2e

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, architecture, unit-tests, coverage]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @draft-io/shared-types build
      - run: pnpm --filter @draft-io/shared-utils build
      - run: pnpm --filter @draft-io/backend db:generate
      - run: pnpm build
