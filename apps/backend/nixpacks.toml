[variables]
NIXPACKS_NODE_VERSION = "20"

[phases.install]
cmds = [
  "cd ../.. && corepack enable && corepack prepare pnpm@9.15.9 --activate",
  "cd ../.. && pnpm install --frozen-lockfile --filter @draft-io/backend...",
]

[phases.build]
cmds = ["cd ../.. && pnpm build:railway"]

[start]
cmd = "node dist/main.js"
