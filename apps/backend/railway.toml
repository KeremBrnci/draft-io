[build]
builder = "nixpacks"
buildCommand = "cd ../.. && pnpm build:railway"
watchPatterns = [
  "/apps/backend/**",
  "/packages/shared-types/**",
  "/packages/shared-utils/**",
  "/pnpm-lock.yaml",
  "/package.json",
]

[deploy]
startCommand = "node dist/main.js"
preDeployCommand = "cd ../.. && pnpm db:push:railway"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
